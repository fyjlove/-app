<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>资产管理</title>
    <style>
        /* --- 核心主题与 App 质感优化 --- */
        :root { --bg: #f2f2f7; --card-bg: #ffffff; --text-main: #000000; --text-sub: #8e8e93; --primary: #00c48c; --border: #e5e5ea; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: var(--text-main); -webkit-user-select: none; user-select: none; overflow: hidden; /* 防止橡皮筋效果影响整体 */ }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; /* 去除安卓/iOS默认点击高亮 */ }

        /* --- 丝滑的页面切换动画系统 --- */
        .app-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        .view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); overflow-y: auto; padding-bottom: 90px; padding-top: env(safe-area-inset-top); /* 适配刘海屏 */ transition: transform 0.35s cubic-bezier(0.25, 1, 0.25, 1); z-index: 1; transform: translateX(100%); }
        .view.active { transform: translateX(0); z-index: 2; box-shadow: -5px 0 15px rgba(0,0,0,0.05); }
        .view.push-back { transform: translateX(-30%); z-index: 1; }
        #homeView { transform: translateX(0); } /* 首页默认显示 */

        /* --- 交互反馈 --- */
        .active-scale:active { transform: scale(0.96); transition: transform 0.1s; opacity: 0.8; }
        .nav-btn:active { opacity: 0.5; }

        /* --- 首页样式 --- */
        .header-top { background: var(--card-bg); padding: 20px; padding-top: calc(20px + env(safe-area-inset-top)); border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; margin-bottom: 16px; }
        .total-label { color: var(--text-sub); font-size: 14px; font-weight: 500; }
        .total-value { font-size: 36px; font-weight: bold; margin: 5px 0 20px 0; font-family: "SF Pro Display"; }
        .header-stats { display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 16px; }
        .stat-box { flex: 1; }
        .stat-val { font-size: 18px; font-weight: 600; }
        .stat-title { font-size: 12px; color: var(--text-sub); margin-top: 4px; }
        
        .list-container { padding: 0 16px; }
        .item-card { background: var(--card-bg); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; transition: background-color 0.2s; }
        
        /* 图片展示区 */
        .item-image { width: 50px; height: 50px; background: #f2f2f7; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 14px; overflow: hidden; object-fit: cover; }
        
        .item-info { flex: 1; }
        .item-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center;}
        .tag-active { background: var(--text-main); color: white; font-size: 10px; padding: 3px 8px; border-radius: 6px; margin-left: 8px; font-weight: 600; }
        .item-sub { font-size: 13px; color: var(--text-sub); }
        .item-cost { text-align: right; }
        .cost-val { font-size: 20px; font-weight: bold; color: var(--text-main); }
        .cost-unit { font-size: 12px; color: var(--text-sub); font-weight: normal;}

        /* --- 底部导航栏 (UI 装饰) --- */
        .bottom-tab { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px; z-index: 10; padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { text-align: center; color: var(--text-sub); font-size: 10px; font-weight: 500; display: flex; flex-direction: column; align-items: center; width: 50px;}
        .tab-item.active { color: var(--primary); }
        .tab-icon { font-size: 24px; margin-bottom: 4px; }
        .add-tab-btn { width: 44px; height: 44px; background: var(--primary); color: white; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-top: -5px; box-shadow: 0 4px 10px rgba(0,196,140,0.3); }

        /* --- 添加页样式 --- */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: var(--bg); position: sticky; top: 0; z-index: 10; border-bottom: 0.5px solid var(--border); }
        .nav-title { font-size: 17px; font-weight: 600; }
        .nav-btn { color: var(--primary); font-size: 16px; font-weight: 500; cursor: pointer; padding: 5px; }
        
        .form-group { background: var(--card-bg); border-radius: 12px; margin: 16px; padding: 0 16px; }
        .form-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 0.5px solid var(--border); }
        .form-row:last-child { border-bottom: none; }
        .form-label { font-size: 16px; }
        .form-input { text-align: right; font-size: 16px; border: none; outline: none; background: transparent; color: var(--text-sub); width: 60%; font-family: inherit;}
        .form-input:focus { color: var(--text-main); }
        select.form-input { appearance: none; direction: rtl; }
        
        /* 图片上传器 */
        .image-upload-box { width: 60px; height: 60px; background: #f2f2f7; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; position: relative; border: 1px dashed #ccc; }
        .image-upload-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="app-container">

    <div id="homeView" class="view">
        <div class="header-top">
            <div class="total-label">总资产净值</div>
            <div class="total-value">¥ <span id="totalValue">0.00</span></div>
            <div class="header-stats">
                <div class="stat-box">
                    <div class="stat-val" id="avgDaily">¥0.00</div>
                    <div class="stat-title">日均总成本</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="itemCount">0</div>
                    <div class="stat-title">活跃资产数量</div>
                </div>
            </div>
        </div>

        <div class="list-container" id="itemList">
            </div>
    </div>

    <div class="bottom-tab" id="bottomTab">
        <div class="tab-item active"><div class="tab-icon">🏠</div>首页</div>
        <div class="tab-item"><div class="tab-icon">❤️</div>心愿</div>
        <div class="active-scale" onclick="openAddView()"><div class="add-tab-btn">+</div></div>
        <div class="tab-item"><div class="tab-icon">📊</div>统计</div>
        <div class="tab-item"><div class="tab-icon">👤</div>我的</div>
    </div>

    <div id="addView" class="view">
        <div class="nav-bar">
            <div class="nav-btn" onclick="closeAddView()">取消</div>
            <div class="nav-title">添加资产</div>
            <div class="nav-btn" onclick="saveItem()">保存</div>
        </div>

        <div class="form-group">
            <div class="form-row" style="justify-content: flex-start; gap: 16px;">
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageSelect(event)">
                
                <div class="image-upload-box active-scale" onclick="document.getElementById('imageInput').click()">
                    <span id="uploadHint">📷</span>
                    <img id="previewImg" src="" style="display: none;">
                </div>
                <div style="flex: 1;">
                    <div class="form-label" style="font-size: 12px; color: var(--text-sub); margin-bottom: 4px;">物品名称</div>
                    <input type="text" id="itemName" class="form-input" style="text-align: left; width: 100%; color: var(--text-main);" placeholder="请输入物品名称">
                </div>
            </div>
        </div>

        <div class="form-group">
            <div class="form-row">
                <div class="form-label">购买价格</div>
                <input type="number" id="itemPrice" class="form-input" placeholder="0.00 ¥">
            </div>
            <div class="form-row">
                <div class="form-label">购买日期</div>
                <input type="date" id="itemDate" class="form-input">
            </div>
        </div>

        <div class="form-group">
            <div class="form-row">
                <div class="form-label">成本计算模式</div>
                <select id="itemCalcMode" class="form-input">
                    <option value="day">按日计算</option>
                    <option value="use">按次计算</option>
                </select>
            </div>
        </div>
    </div>

</div>

<script>
    document.getElementById('itemDate').value = new Date().toISOString().split('T')[0];
    let myAssets = JSON.parse(localStorage.getItem('my_assets_data')) || [];
    let currentImageBase64 = ''; // 用于存放压缩后的图片数据

    // --- 页面滑动动画控制 ---
    function openAddView() {
        document.getElementById('addView').classList.add('active');
        document.getElementById('homeView').classList.add('push-back');
        document.getElementById('bottomTab').style.display = 'none'; // 隐藏底部栏
    }

    function closeAddView() {
        document.getElementById('addView').classList.remove('active');
        document.getElementById('homeView').classList.remove('push-back');
        setTimeout(() => { document.getElementById('bottomTab').style.display = 'flex'; }, 300);
    }

    // --- 相册图片压缩与预览 (核心难点) ---
    function handleImageSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                // 使用 Canvas 对图片进行缩放压缩 (极度重要，防止本地缓存撑爆)
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const MAX_SIZE = 200; // 缩略图最大宽高 200px
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                } else {
                    if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                }
                
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);

                // 将压缩后的图片转换为 Base64 字符串保存
                currentImageBase64 = canvas.toDataURL('image/jpeg', 0.8);
                
                // 显示在界面上
                document.getElementById('previewImg').src = currentImageBase64;
                document.getElementById('previewImg').style.display = 'block';
                document.getElementById('uploadHint').style.display = 'none';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // --- 保存数据 ---
    function saveItem() {
        const name = document.getElementById('itemName').value;
        const price = parseFloat(document.getElementById('itemPrice').value);
        const date = document.getElementById('itemDate').value;
        const mode = document.getElementById('itemCalcMode').value;

        if (!name || isNaN(price) || !date) { alert("请填写完整的名称、价格和日期！"); return; }

        const newItem = {
            id: Date.now().toString(),
            image: currentImageBase64 || '📦', // 如果没传图，默认用emoji
            name: name,
            price: price,
            date: date,
            calcMode: mode,
            useCount: mode === 'use' ? 0 : null,
            status: 'active'
        };

        myAssets.unshift(newItem);
        localStorage.setItem('my_assets_data', JSON.stringify(myAssets));

        // 清空表单
        document.getElementById('itemName').value = '';
        document.getElementById('itemPrice').value = '';
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('uploadHint').style.display = 'block';
        currentImageBase64 = '';
        
        renderList();
        closeAddView();
    }

    // --- 记录按次打卡 ---
    function recordUse(id) {
        const item = myAssets.find(i => i.id === id);
        if (item && item.calcMode === 'use') {
            item.useCount += 1;
            localStorage.setItem('my_assets_data', JSON.stringify(myAssets));
            renderList();
        }
    }

    // --- 渲染界面 ---
    function renderList() {
        const listElement = document.getElementById('itemList');
        let totalValue = 0;
        let totalDailyCost = 0;
        let activeCount = 0;

        if (myAssets.length === 0) {
            listElement.innerHTML = '<div style="text-align:center; padding: 60px; color:#8e8e93; font-size: 14px;">空空如也<br>点击下方 + 号添加你的第一笔资产吧</div>';
        } else {
            listElement.innerHTML = myAssets.map(item => {
                totalValue += item.price;
                activeCount++;

                let costDisplay = '0.00';
                let progressText = '';
                let actionHtml = '';

                // 判断是图片还是默认 emoji
                const imageContent = item.image.startsWith('data:image') 
                    ? `<img src="${item.image}" style="width:100%; height:100%; object-fit:cover;">` 
                    : item.image;

                if (item.calcMode === 'day') {
                    const msPerDay = 1000 * 60 * 60 * 24;
                    const daysUsed = Math.floor((new Date() - new Date(item.date)) / msPerDay) || 1;
                    const costPerDay = item.price / daysUsed;
                    costDisplay = costPerDay.toFixed(2);
                    totalDailyCost += costPerDay;
                    progressText = `已使用 ${daysUsed} 天`;
                } else {
                    costDisplay = item.useCount === 0 ? item.price.toFixed(2) : (item.price / item.useCount).toFixed(2);
                    progressText = `已使用 ${item.useCount} 次`;
                    actionHtml = `<div class="active-scale" onclick="recordUse('${item.id}')" style="background:var(--primary); padding:4px 14px; border-radius:12px; font-size:12px; color:white; margin-top:8px; display:inline-block; font-weight:600;">打卡 +1</div>`;
                }

                return `
                    <div class="item-card active-scale">
                        <div class="item-image">${imageContent}</div>
                        <div class="item-info">
                            <div class="item-name">${item.name} <span class="tag-active">活跃中</span></div>
                            <div class="item-sub">¥${item.price.toFixed(2)} · ${progressText}</div>
                            ${actionHtml}
                        </div>
                        <div class="item-cost">
                            <div class="cost-val">¥${costDisplay}<span class="cost-unit">/${item.calcMode === 'day' ? '天' : '次'}</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('totalValue').innerText = totalValue.toFixed(2);
        document.getElementById('itemCount').innerText = activeCount;
        document.getElementById('avgDaily').innerText = `¥${totalDailyCost.toFixed(2)}`;
    }

    renderList();
</script>
</body>
</html>
